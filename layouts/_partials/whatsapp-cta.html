<div class="whatsapp-cta">
  <p>
    {{ if eq site.Language.Lang "es" }}
      ¿Necesitas un tip local, un lugar para trabajar o un día de playa?
      <a href="https://wa.me/{{ site.Params.whatsapp | replaceRE "\\+" "" }}?text={{ "Hola, encontré Cartagena Up y necesito ayuda." | urlquery }}"
         target="_blank" rel="noopener" class="whatsapp-link">
        Escríbenos por WhatsApp.
      </a>
    {{ else }}
      Need a local tip, work spot, or beach day?
      <a href="https://wa.me/{{ site.Params.whatsapp | replaceRE "\\+" "" }}?text={{ "Hi! I found Cartagena Up and need help." | urlquery }}"
         target="_blank" rel="noopener" class="whatsapp-link">
        Message us on WhatsApp.
      </a>
    {{ end }}
  </p>
</div>
