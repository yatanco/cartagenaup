<div class="lang-switcher">
  {{ $currentPath := .RelPermalink }}
  {{ if eq site.Language.Lang "en" }}
    <span class="lang-active">English</span>
    <a href="{{ printf "/es%s" $currentPath }}" class="lang-link">Español</a>
  {{ else }}
    {{ $enPath := strings.TrimPrefix "/es" $currentPath }}
    {{ if eq $enPath "" }}{{ $enPath = "/" }}{{ end }}
    <a href="{{ $enPath }}" class="lang-link">English</a>
    <span class="lang-active">Español</span>
  {{ end }}
</div>
